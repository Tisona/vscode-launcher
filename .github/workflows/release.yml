name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: --target x86_64-unknown-linux-gnu
          - os: macos-latest
            rust_target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Build + publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

      # ---------------------------------------------------------------
      # Portable artifacts — zip the raw binaries and attach them to
      # the release alongside the Tauri-bundled installers. Linux's
      # AppImage is already portable, so no extra step for Ubuntu.
      # ---------------------------------------------------------------

      - name: Create portable Windows zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = "src-tauri/target/x86_64-pc-windows-msvc/release/app.exe"
          if (-not (Test-Path $src)) {
            Write-Error "Expected raw exe at $src — did cargo build run?"
            exit 1
          }
          Copy-Item $src vscode-launcher.exe
          Compress-Archive -Path vscode-launcher.exe -DestinationPath vscode-launcher-windows-x64.zip

      - name: Attach portable Windows zip
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: vscode-launcher-windows-x64.zip

      - name: Create portable macOS universal zip
        if: matrix.os == 'macos-latest'
        run: |
          cd "src-tauri/target/universal-apple-darwin/release/bundle/macos"
          zip -r -y "$GITHUB_WORKSPACE/vscode-launcher-macos-universal.zip" vscode-launcher.app

      - name: Attach portable macOS universal zip
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: vscode-launcher-macos-universal.zip
